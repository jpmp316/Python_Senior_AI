<!-- 
  Componente: Header/Navigation
  Descripción: Barra de navegación principal con logo, menú y botón CTA
  Dependencias: Tailwind CSS, Flowbite
  Uso: Cargar dinámicamente en index.html
-->
<nav
  class="bg-neutral-primary fixed w-full z-20 top-0 start-0 border-b border-default"
  role="navigation"
  aria-label="Navegación principal"
>
  <div
    class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
  >
    <!-- Logo / Brand -->
    <a
      href="#"
      class="flex items-center space-x-3 rtl:space-x-reverse"
      aria-label="Ir al inicio"
    >
      <span
        class="self-center text-xl text-heading font-semibold whitespace-nowrap"
      >
        Digital Twins Lab
      </span>
    </a>

    <!-- CTA Button -->
    <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
      <button
        type="button"
        class="text-white bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-3 py-2 focus:outline-none transition-colors duration-200"
        aria-label="Agendar una demostración"
      >
        Agenda tu demo
      </button>
    </div>

    <!-- Navigation Menu -->
    <div
      class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
      id="navbar-sticky"
    >
      <ul
        class="flex flex-col p-4 md:p-0 mt-4 font-medium border border-default rounded-base bg-neutral-secondary-soft md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-neutral-primary"
        role="menubar"
      >
        <li role="none">
          <a
            href="#"
            class="block py-2 px-3 text-white bg-brand rounded-sm md:bg-transparent md:text-fg-brand md:p-0 transition-colors duration-200"
            aria-current="page"
            role="menuitem"
          >
            Inicio
          </a>
        </li>
        <li role="none">
          <a
            href="#"
            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 transition-colors duration-200"
            role="menuitem"
          >
            Sobre el proyecto
          </a>
        </li>
        <li role="none">
          <a
            href="#"
            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 transition-colors duration-200"
            role="menuitem"
          >
            Investigación
          </a>
        </li>
        <li role="none">
          <a
            href="#"
            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 transition-colors duration-200"
            role="menuitem"
          >
            Contacto
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
