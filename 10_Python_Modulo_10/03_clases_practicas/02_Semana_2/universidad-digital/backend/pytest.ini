[pytest]
testpaths = tests
addopts = -ra --strict-markers --basetemp=.test_artifacts/tmp -p no:cacheprovider -p no:tmpdir
cache_dir = tests/.pytest_cache
norecursedirs = pytest-cache-files-* .tmp .pytest_cache tmp .test_artifacts
markers =
    unit: pruebas unitarias de lógica pura
    integration: pruebas de integración entre componentes
    e2e: pruebas end-to-end de flujos completos
    security: casos de seguridad y validaciones
    slow: pruebas lentas o de alto costo
filterwarnings =
    ignore::DeprecationWarning
